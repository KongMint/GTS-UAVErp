services:
  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      - JWT_SECRET=uav-erp-prod-secret-change-me
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
